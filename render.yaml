# Blueprint de Render para el backend (NestJS) + PostgreSQL.
# Crea la base y el web service de una. En el panel de Render: "New +" → "Blueprint".
# Las variables con `sync: false` hay que cargarlas a mano en el dashboard (son secretas).

databases:
  - name: bosward-db
    plan: free
    databaseName: ward_perfumes
    user: ward

services:
  - type: web
    name: bosward-back
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      # true en el primer deploy para que cree el esquema; luego conviene pasarlo a false.
      - key: DB_SYNC
        value: "true"
      # Connection string interno de la base de arriba (lo inyecta Render).
      - key: DATABASE_URL
        fromDatabase:
          name: bosward-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://bosward-frontend.netlify.app
      # Firebase: subir firebase-service-account.json como "Secret File" en Render
      # con path /etc/secrets/firebase-service-account.json y setear:
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: /etc/secrets/firebase-service-account.json
      # ── Secretos: cargar en el dashboard ──
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
