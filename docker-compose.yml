version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ward_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ward_perfumes
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  # Opcional: interfaz web para administrar la BD
  adminer:
    image: adminer
    container_name: ward_adminer
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      - db

volumes:
  mysql_data:
